        :root {

            --secondary-color: #673ab7; /* Deep Purple - sophistication, intelligence */
            --accent-color: #ffeb3b; /* Amber - warning, highlights, energy */
            --text-color: #e0e0e0; /* Light gray for readability */
            --background-dark: #1a1a2e; /* Dark blue-purple - deep tech, night sky */
            --background-light: #2e3b55; /* Slightly lighter dark - content background */
            --border-color: rgba(255, 255, 255, 0.1);

            --font-display: 'Orbitron', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {

            color: var(--text-color);
            background-color: var(--background-dark);
            line-height: 1.6;
            scroll-behavior: smooth;
        }

        a {

            text-decoration: none;

        }

        a:hover {
            color: var(--accent-color);
        }

        #root {

            flex-direction: column;
            min-height: 100vh;
        }

        header {

            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;

            position: sticky;
            top: 0;
            z-index: 1000;

        .logo {

            align-items: center;
            font-family: var(--font-display);
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary-color);
            text-shadow: 0 0 8px var(--primary-color);

        nav ul {

            list-style: none;
        }

        nav li {

            position: relative;
        }

        nav a {
            font-family: var(--font-display);
            font-size: 1.1rem;
            font-weight: 400;
            color: var(--text-color);
            text-transform: uppercase;
            padding: 0.5rem 0;
            position: relative;
            transition: all 0.3s ease;
        }

        nav a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 0;
            height: 2px;
            background-color: var(--primary-color);
            transition: width 0.3s ease;
        }

        nav a:hover::after,
        nav a.active::after {
            width: 100%;
        }

        nav a.active {
            color: var(--primary-color);
            text-shadow: 0 0 5px var(--primary-color);
        }

        .language-switcher {

            gap: 10px;
            position: absolute;
            right: 2rem;
            top: 4rem;
            z-index: 1001; /* Ensure it's above other header elements if needed */
        }

        .language-switcher img {
            width: 30px;
            height: 20px;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 3px;
            transition: all 0.2s ease;
            filter: grayscale(80%);
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.3);
        }

        .language-switcher img:hover {
            filter: grayscale(0%);
            transform: scale(1.1);
            border-color: var(--primary-color);
        }

        .language-switcher img.active-lang {
            filter: grayscale(0%);
            border-color: var(--primary-color);
            box-shadow: 0 0 10px var(--primary-color);
        }

        main {
            flex-grow: 1;
        }

        section {
            padding: 6rem 8%;
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            overflow: hidden;
            border-bottom: 1px solid var(--border-color);
        }

        section:last-of-type {
            border-bottom: none;
        }

        .section-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0.05;
            z-index: 0;
        }

        .section-content {
            position: relative;
            z-index: 1;
            max-width: 1000px;
        }

        h1, h2 {

            font-weight: 700;
            margin-bottom: 1.5rem;
            line-height: 1.2;
            text-transform: uppercase;
            letter-spacing: 1px;

        h1 {
            font-size: 3.5rem;
            color: var(--accent-color);
            text-shadow: 0 0 15px rgba(255, 235, 59, 0.5);

        h2 {

            color: var(--primary-color);
            text-shadow: 0 0 10px rgba(0, 188, 212, 0.4);
            margin-top: 2rem;
            margin-bottom: 1rem;

            font-size: 2rem;
            color: var(--secondary-color);
            margin-top: 1.5rem;
            margin-bottom: 1rem;
            text-transform: uppercase;
        }

        p {
            font-size: 1.1rem;
            margin-bottom: 1rem;
            color: var(--text-color);
        }

        .button-primary {

            color: var(--background-dark);
            padding: 1rem 2rem;
            border-radius: 5px;
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            display: inline-block;
            margin-top: 2rem;
            box-shadow: 0 0 15px rgba(0, 188, 212, 0.6);
            border: none;
            cursor: pointer;
        }

        .button-primary:hover {
            background-color: var(--accent-color);
            color: var(--background-dark);
            box-shadow: 0 0 20px rgba(255, 235, 59, 0.8);
            transform: translateY(-3px);
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 3rem;
            width: 100%;
        }

        .card {
            background-color: var(--background-light);
            border-radius: 10px;
            padding: 2rem;
            text-align: left;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-color);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0,188,212,0.1) 0%, rgba(0,188,212,0) 70%);
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .card:hover::before {

            color: var(--accent-color);
            font-size: 1.8rem;

            font-size: 1.2rem;
            margin-right: 10px;
            color: var(--primary-color);

        .mission-log li.locked {

            opacity: 0.6;
            cursor: not-allowed;
            border-left-color: var(--border-color);

        .mission-log li.locked h4 {
            color: var(--text-color);
        }

        .mission-log li.completed {
            border-left-color: var(--accent-color);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.3), 0 0 15px rgba(255, 235, 59, 0.4);
        }

        .mission-log li.completed h4 {
            color: var(--accent-color);
        }

            margin-top: 1rem;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease-out;
        }

        .expandable-content.expanded {
            max-height: 1000px; /* Adjust as needed */

        }

        .read-more-button {
            background: none;
            border: 1px solid var(--secondary-color);
            color: var(--secondary-color);

            border-radius: 5px;
            cursor: pointer;
            font-family: var(--font-main);
            font-size: 0.9rem;

        .read-more-button:hover {

            color: var(--text-color);

            color: var(--text-color);
            text-align: center;

        .glowing-text {

        }

            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }

        @media (max-width: 992px) {
            h1 { font-size: 3rem; }
            h2 { font-size: 2.2rem; }

            nav li { margin-left: 0; margin-top: 10px; }
            header { flex-direction: column; }
            .logo { margin-bottom: 1rem; }
            nav { width: 100%; text-align: right; }
            .language-switcher {
                position: static; /* Adjust position for smaller screens */
                margin-top: 1rem;
                justify-content: flex-end;

        }

        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            h2 { font-size: 1.8rem; }
            section { padding: 4rem 5%; }
            .card-grid { grid-template-columns: 1fr; }
            .logo { font-size: 1.5rem; }
            .logo img { height: 30px; }
            nav a { font-size: 0.9rem; }
        }

            return (

                        alt="Português"
                        title="Português"
                        className={currentLanguage === 'pt' ? 'active-lang' : ''}
                        onClick={() => setLanguage('pt')}
                    />
                    <img
                        src="https://flagicons.lipis.dev/flags/4x3/us.svg" /* Or gb.svg for UK English */
                        alt="English"
                        title="English"
                        className={currentLanguage === 'en' ? 'active-lang' : ''}
                        onClick={() => setLanguage('en')}
                    />
                </div>
            );
        }

        function Navbar({ activeSection, setActiveSection, currentLangData }) {
            return (
                <header>
                    <div className="logo">
                        <img src="logo_yellow.png" alt="RaddarTools Logo" />
                        RaddarTools
                    </div>
                    <nav>
                        <ul>
                            {currentLangData.sections.map((section) => (
                                <li key={section.id}>
                                    <a
                                        href={`#${section.id}`}
                                        className={activeSection === section.id ? 'active' : ''}
                                        onClick={(e) => {
                                            e.preventDefault();
                                            document.getElementById(section.id).scrollIntoView({ behavior: 'smooth' });
                                            setActiveSection(section.id);
                                        }}
                                    >
                                        {section.label}
                                    </a>
                                </li>
                            ))}
                        </ul>
                    </nav>
                </header>
            );
        }

        function Section({ id, children, className = '' }) {
            return (
                <section id={id} className={`animated-gradient ${className}`}>
                    <div className="section-content">
                        {children}
                    </div>
                </section>
            );
        }

        function ExpandableContent({ children, title, buttonTextExpanded, buttonTextCollapsed }) {
            const [isExpanded, setIsExpanded] = useState(false);
            const contentRef = useRef(null);

            const toggleExpand = () => {
                setIsExpanded(!isExpanded);
            };

            return (
                <div>
                    <button className="read-more-button" onClick={toggleExpand}>
                        {isExpanded ? buttonTextExpanded : buttonTextCollapsed}
                    </button>
                    <div ref={contentRef} className={`expandable-content ${isExpanded ? 'expanded' : ''}`}>
                        {children}
                    </div>
                </div>
            );
        }

                                currentActive = section.id;
                                break;
                            }
                        }
                    }
